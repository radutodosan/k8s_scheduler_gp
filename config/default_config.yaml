# K8s GP Scheduler â€” Default Experiment Configuration
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

name: "baseline_optimal"
seed: 42
num_training_instances: 8
num_validation_instances: 3
num_test_instances: 4
dynamic_instances: true            # regenerate training instances each GP generation
output_dir: "tmp/results"
output_format: "csv"

# â”€â”€ Cluster â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
cluster:
  node_heterogeneity:
    enabled: true
    tiers: 3                    # small / medium / large node types
    cpu_range: [4.0, 16.0]     # cores: min and max across tiers
    mem_range: [8192.0, 32768.0]  # MiB: 8 GB → 32 GB
    cost_range: [0.5, 2.5]     # cost/hour: cheap → expensive
  node_templates:
    - count: 6
      cpu_capacity: 8.0         # base capacity (overridden by heterogeneity tiers)
      mem_capacity: 16384.0     # MiB (16 GB)
      cost_per_hour: 1.0

# â”€â”€ Workload â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
workload:
  total_pods: 84
  arrival_rate: 0.9             # avg pods / time-unit (Poisson Î»)
  burst_probability: 0.08
  burst_size_min: 2
  burst_size_max: 6
  cpu_range: [0.1, 1.6]
  mem_range: [128.0, 3072.0]
  duration_range: [4.0, 40.0]
  priority_weights:
    low: 0.5
    medium: 0.3
    high: 0.2
  qos_weights:
    best_effort: 0.3
    burstable: 0.45
    guaranteed: 0.25
  namespaces: ["default", "production", "batch"]
  # Taints, tolerations, labels, node selectors
  possible_taints: ["spot"]
  taint_toleration_probability: 0.5
  possible_labels:
    disktype: ["ssd", "hdd"]
    zone: ["zone-a", "zone-b"]
  node_selector_probability: 0.12
  # Limits & overcommit
  limit_ratio_min: 1.0
  limit_ratio_max: 1.6
  limit_probability: 0.35
  # Anti-affinity
  possible_anti_affinity_keys: ["app-web", "app-api", "app-worker"]
  anti_affinity_probability: 0.2
  # Arrival patterns: "constant", "diurnal", "bursty"
  arrival_pattern: "diurnal"
  diurnal_peak_rate: 2.2
  diurnal_trough_rate: 0.6
  bursty_spike_multiplier: 3.5
  bursty_spike_probability: 0.1
  # Workload profile: "" (generic), "web_serving", "ai_training",
  # "ci_cd", "batch_processing", "microservices", "mixed"
  profile: ""
  profile_mix:
    web_serving: 0.30
    ai_training: 0.10
    ci_cd: 0.15
    batch_processing: 0.20
    microservices: 0.25

# â”€â”€ Genetic Programming â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
gp:
  engine: "deap"
  population_size: 120
  n_generations: 40
  tournament_size: 4
  crossover_prob: 0.82
  mutation_prob: 0.18
  max_tree_depth: 9
  elitism_ratio: 0.08
  parsimony_coefficient: 0.002
  n_workers: 1
  fitness_aggregation: "mean_minus_std"
  fitness_std_penalty: 0.2
  validation_hof_size: 8

# â”€â”€ Fitness weights (Î±Â·W + Î²Â·R + Î³Â·F + Î´Â·E) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
fitness:
  alpha_wait_time: 0.15
  beta_resource_waste: 0.25
  gamma_failed_pods: 0.45
  delta_evicted_pods: 0.15
# â”€â”€ Dynamics (node failures) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
dynamics:
  failure_mode: "off"               # "off" | "reschedule" | "kill"
  failure_rate: 1                   # 1=10%, 2=20%, 3=30% of nodes
  recovery_time_min: 10.0
  recovery_time_max: 30.0
  restart_overhead_min: 2.0         # extra time for pod restart (reschedule mode)
  restart_overhead_max: 8.0